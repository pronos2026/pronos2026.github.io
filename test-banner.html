<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
.banner { background: #0A5F7A; padding: 1rem; color: white; }
.banner-teams { display: flex; flex-direction: column; gap: 6px; }
.team-a { display: flex; align-items: center; gap: 8px; justify-content: flex-start; }
.team-b { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
.vs { text-align: center; opacity: 0.5; font-size: 12px; }
span.flag { font-size: 28px; }
span.name { font-size: 22px; font-weight: bold; }
</style>
</head>
<body>
<div class="banner">
  <div class="banner-teams">
    <div class="team-a">
      <span class="flag">🇶🇦</span>
      <span class="name">QATAR</span>
    </div>
    <div class="vs">vs</div>
    <div class="team-b">
      <span class="name">SUISSE</span>
      <span class="flag">🇨🇭</span>
    </div>
  </div>
</div>
</body>
</html>
